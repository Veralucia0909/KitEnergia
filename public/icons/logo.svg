<svg width="660" height="200" viewBox="0 0 660 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>KitEnergia – Controle de Leitura</title>
<desc>Logo com casa, medidor elétrico circular e raio</desc>

<!-- CASA – branco com detalhe âmbar -->
<polyline points="100,50 190,10 280,50" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="120,50 120,165 260,165 260,50" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
<line x1="100" y1="50" x2="120" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
<line x1="260" y1="50" x2="280" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
<!-- Detalhe topo âmbar -->
<polyline points="112,55 190,17 268,55" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

<!-- MEDIDOR -->
<circle cx="190" cy="108" r="50" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

<!-- Arco de fundo -->
<path d="M 148 137 A 50 50 0 1 1 232 137" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="7" stroke-linecap="round"/>
<!-- Arco branco esquerda -->
<path d="M 148 137 A 50 50 0 0 1 190 58" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
<!-- Arco âmbar direita -->
<path d="M 190 58 A 50 50 0 0 1 232 137" fill="none" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>

<!-- Display -->
<rect x="162" y="91" width="56" height="24" rx="4" fill="rgba(0,0,0,0.35)" stroke="#f59e0b" stroke-width="1.2"/>
<text x="190" y="108" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">1028</text>

<!-- Marcadores -->
<line x1="190" y1="61" x2="190" y2="67" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
<line x1="142" y1="108" x2="148" y2="108" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
<line x1="238" y1="108" x2="232" y2="108" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>

<!-- RAIO âmbar -->
<polygon points="186,123 178,145 189,141 183,163 202,138 190,142" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.5" stroke-linejoin="round"/>

<!-- "Kit" branco -->
<text x="308" y="103" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#ffffff" letter-spacing="-1">Kit</text>
<!-- "Energia" âmbar -->
<text x="388" y="103" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#f59e0b" letter-spacing="-1">Energia</text>

<!-- Linhas divisórias -->
<line x1="308" y1="121" x2="378" y2="121" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
<line x1="522" y1="121" x2="640" y2="121" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
<!-- Subtítulo -->
<text x="450" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="2.5">Controle de Leitura</text>

</svg>
